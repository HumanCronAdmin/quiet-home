<meta property="og:title" content="QuietHome Product Database">

<nav class="nav"><div class="container">

<section style="padding-top:32px"><div class="container">
<h1 style="font-size:1.6rem;margin-bottom:8px">Noise Level Database</h1>
<p style="color:#57534E;margin-bottom:20px">Every product compared by actual decibels. Filter, sort, find what's truly quiet.</p>

<div class="filters">
<input type="text" id="search-box" placeholder="Search products...">
<select id="filter-category">
<option value="">All Categories</option>
<option value="air-purifier">Air Purifier</option>
<option value="fan">Fan</option>
<option value="keyboard">Keyboard</option>
<option value="blender">Blender</option>
<option value="dishwasher">Dishwasher</option>
<option value="vacuum">Vacuum</option>
<option value="ac">AC Unit</option>
<option value="dehumidifier">Dehumidifier</option>
<option value="other">Other</option>
</select>
<select id="filter-noise">
<option value="">All Noise Levels</option>
<option value="whisper">Whisper (&lt;30 dB)</option>
<option value="quiet">Quiet (30-44 dB)</option>
<option value="moderate">Moderate (45-60 dB)</option>
<option value="noticeable">Loud (60+ dB)</option>
</select>
<select id="sort-by">
<option value="quietest">Quietest First</option>
<option value="loudest">Loudest First</option>
<option value="price-low">Price: Low to High</option>
<option value="price-high">Price: High to Low</option>
</select>
</div>

<div class="product-count" id="result-count">Loading...</div>
<div class="product-grid" id="product-grid"></div>
</div></section>
